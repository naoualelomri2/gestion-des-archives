<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Page d'Accueil </title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to bottom right, #d72638, #3fc060); /* rouge et vert */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            width: 200px;
            height: auto;
            border-radius: 50% ;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2em;
            margin-bottom: 30px;
        }

        .btn {
            background-color: white;
            color: #d72638;
            padding: 15px 30px;
            border: none;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1em;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: #3fc060;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="{{ url_for('static', filename='logo.jpg') }}" alt="Logo " class="logo">
        <h1>Bienvenue sur la plateforme de gestion des archives</h1>
        <a href="{{ url_for('select_category') }}" class="btn">Accéder à l'application</a>

    </div>
</body>
</html>
