<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Téléverser un document</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to bottom right, #d72638, #3fc060);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 20px 40px;
            font-size: 24px;
            font-weight: bold;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .upload-form {
            background: white;
            color: #333;
            padding: 30px 40px;
            border-radius: 15px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.3);
            width: 350px;
            text-align: center;
        }

        .upload-form input[type="text"],
        .upload-form input[type="date"],
        .upload-form input[type="file"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
        }

        .upload-form button {
            background-color: #3fc060;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            transition: background 0.3s;
        }

        .upload-form button:hover {
            background-color: #076625;
        }

        .back-link {
            display: block;
            margin-top: 20px;
            text-decoration: none;
            font-weight: bold;
            color: #6a11cb;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <header>
        📤 Téléverser un document
    </header>

    <main>
        <form method="POST" enctype="multipart/form-data" class="upload-form">
            <input type="text" name="titre" placeholder="Titre du document" required><br>
            <input type="date" name="date" required><br>
            <input type="file" name="fichier" required><br>
            <button type="submit">Téléverser</button>
        </form>
    </main>

</body>
</html>
